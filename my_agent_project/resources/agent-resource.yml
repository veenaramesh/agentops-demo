common_permissions: &permissions
  permissions:
    - level: CAN_VIEW
      group_name: users


resources:
  jobs:
    agent_development_job:
      parameters:
        - name: bundle_root
          default: ${workspace.file_path}
      name: ${bundle.target}-my_agent_project-agent-development-job
      tasks:
        - task_key: AgentDevelopment
          notebook_task:
            notebook_path: ../agent_development/agent/notebooks/Agent.py
            base_parameters:
              uc_catalog: ${var.uc_catalog}
              schema: ${var.schema}
              vector_search_endpoint: ${var.vector_search_endpoint}
              vector_search_index: ${var.vector_search_index}
              experiment: ${var.experiment}
              registered_model: ${var.registered_model}
              max_words: 200
              model_alias: ${var.model_alias}
              # git source information of current ML resource deployment. It will be persisted as part of the workflow run
              git_source_info: url:${bundle.git.origin_url}; branch:${bundle.git.branch}; commit:${bundle.git.commit}
          environment_key: agent_requirements

        - task_key: AgentEvaluation
          depends_on:
            - task_key: AgentDevelopment
          notebook_task:
            notebook_path: ../agent_development/agent_evaluation/notebooks/AgentEvaluation.py
            base_parameters:
              uc_catalog: ${var.uc_catalog}
              schema: ${var.schema}
              registered_model: ${var.registered_model}
              eval_table: ${var.eval_table}
              model_alias: ${var.model_alias}
              experiment: ${var.experiment}
              # git source information of current ML resource deployment. It will be persisted as part of the workflow run
              git_source_info: url:${bundle.git.origin_url}; branch:${bundle.git.branch}; commit:${bundle.git.commit}
          environment_key: agent_requirements

        - task_key: AgentDeployment
          depends_on:
            - task_key: AgentEvaluation
          notebook_task:
            notebook_path: ../agent_deployment/model_serving/notebooks/ModelServing.py
            base_parameters:
              uc_catalog: ${var.uc_catalog}
              schema: ${var.schema}
              registered_model: ${var.registered_model}
              model_alias: ${var.model_alias}
              scale_to_zero: ${var.scale_to_zero}
              workload_size: "Small"
              agent_model_serving_endpoint: ${var.agent_model_serving_endpoint}
              # git source information of current ML resource deployment. It will be persisted as part of the workflow run
              git_source_info: url:${bundle.git.origin_url}; branch:${bundle.git.branch}; commit:${bundle.git.commit}
          environment_key: agent_requirements

      environments:
        - environment_key: agent_requirements
          spec:
            client: "3"
            dependencies: 
              - "-r /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/files/agent_development/agent_requirements.txt"

      <<: *permissions
      # If you want to turn on notifications for this job, please uncomment the below code,
      # and provide a list of emails to the on_failure argument.
      #
      #  email_notifications:
      #    on_failure:
      #      - first@company.com
      #      - second@company.com

targets:
  dev:
    resources:
      jobs:
        agent_development_job:
          schedule:
            quartz_cron_expression: "0 0 12 1 1/1 ? * " # runs once a month at 12 am  
            pause_status: "PAUSED"
            timezone_id: UTC

  test:
    resources:
      jobs:
        agent_development_job:
          schedule:
            quartz_cron_expression: "0 0 12 1 1/1 ? * " # runs once a month at 12 am  
            pause_status: "PAUSED"
            timezone_id: UTC

  prod:
    resources:
      jobs:
        agent_development_job:
          # TODO: update this to reflect your schedule
          schedule:
            quartz_cron_expression: "0 0 12 1 1/1 ? * " # runs once a month at 12 am  
            pause_status: "UNPAUSED"
            timezone_id: UTC

  staging:
    resources:
      jobs:
        agent_development_job:
          # TODO: update this to reflect your schedule
          schedule:
            quartz_cron_expression: "0 0 12 1 1/1 ? * " # runs once a month at 12 am  
            pause_status: "UNPAUSED"
            timezone_id: UTC
