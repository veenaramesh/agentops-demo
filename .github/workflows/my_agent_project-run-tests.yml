name: Training Unit and Integration Tests for my_agent_project
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'my_agent_project/**'
      - '.github/workflows/my_agent_project-run-tests.yml'

defaults:
  run:
    working-directory: ./my_agent_project/

env:
  DATABRICKS_HOST: https://<instance>.cloud.databricks.com
  DATABRICKS_CLIENT_SECRET: ${{ secrets.STAGING_DATABRICKS_CLIENT_SECRET }}
  DATABRICKS_CLIENT_ID: ${{ secrets.STAGING_DATABRICKS_CLIENT_ID }}
 # DATABRICKS_TOKEN: ${{ secrets.STAGING_WORKSPACE_TOKEN }}

concurrency: my_agent_project-training-integration-test-staging

jobs:
  unit_tests:
    runs-on:
      group: <runner-group>
      labels: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12.3
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pytest
      - name: Run tests with pytest
        run: |
            pytest tests/unit

  integration_test:
    needs: unit_tests
    runs-on:
      group: <runner-group>
      labels: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.258.0
      - name: Validate Bundle For Test Deployment Target in Staging Workspace
        id: validate
        run: |
          databricks bundle validate -t test
      - name: Deploy Bundle to Test Deployment Target in Staging Workspace
        id: deploy
        run: |
          databricks bundle deploy -t test
      - name: Run Data Preprocessing Workflow for Test Deployment Target in Staging Workspace
        id: data_preprocessing
        run: |
          databricks bundle run data_preprocessing_job -t test
      - name: Run Agent Development Workflow for Test Deployment Target in Staging Workspace
        id: agent_development
        run: |
          databricks bundle run agent_development_job -t test