common_permissions: &permissions
  permissions:
    - level: CAN_READ
      group_name: users

grants: &grants
  grants:
    - privileges:
        - EXECUTE
      principal: account users

resources:
  registered_models:
    model:
      name: ${var.registered_model}
      catalog_name: ${var.uc_catalog}
      schema_name: ${var.schema}
      comment: Registered model in Unity Catalog for the agent bundle (${bundle.target}).
      <<: *grants

    feedback_model:
      name: feedback
      catalog_name: ${var.uc_catalog}
      schema_name: ${var.schema}
      comment: Registered model for the agent's feedback for ${bundle.target} deployment target.
      <<: *grants

  experiments:
    experiment:
      name: ${var.experiment}
      <<: *permissions

  model_serving_endpoints:
    agent_model_serving_endpoint:
      name: ${var.agent_model_serving_endpoint}
      route_optimized: true
      permissions:
        - level: CAN_QUERY
          group_name: users

  apps:
    dash-chatbot-app:
      name: ${var.chatbot_name}
      source_code_path: /Users/${workspace.current_user.userName}/.bundle/agent/${bundle.target}/files/agent_deployment/chat_interface_deployment/
      description: 'Databricks assistant app (agent bundle).'
